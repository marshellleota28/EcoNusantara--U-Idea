<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Eco Nusantara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div id="navbar-container"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full glass p-8 rounded-2xl shadow-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 bg-green-500 rounded-full mix-blend-multiply filter blur-2xl opacity-50 z-0"></div>
            <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-32 h-32 bg-yellow-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 z-0"></div>
            
            <div class="relative z-10">
                <div class="text-center mb-8">
                    <i data-lucide="leaf" class="h-12 w-12 text-green-600 mx-auto mb-2"></i>
                    <h2 class="text-3xl font-extrabold text-gray-900 font-serif">Selamat Datang</h2>
                    <p class="text-sm text-gray-600 mt-2">Masuk untuk melihat dampak personal Anda.</p>
                </div>

                <form id="login-form" class="space-y-6">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                            </div>
                            <input type="email" id="email" required class="focus:ring-green-500 focus:border-green-500 block w-full pl-10 py-2 border-gray-300 rounded-md border" placeholder="anda@email.com">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                            </div>
                            <input type="password" id="password" required class="focus:ring-green-500 focus:border-green-500 block w-full pl-10 py-2 border-gray-300 rounded-md border" placeholder="********">
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" type="checkbox" class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded cursor-pointer">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-900 cursor-pointer"> Ingat saya </label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-green-600 hover:text-green-500"> Lupa password? </a>
                        </div>
                    </div>

                    <div>
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-colors font-bold">
                            Masuk
                        </button>
                    </div>
                </form>

                <div class="mt-6 relative">
                    <div class="absolute inset-0 flex items-center" aria-hidden="true">
                        <div class="w-full border-t border-gray-300/50"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500 font-medium">Atau masuk dengan</span>
                    </div>
                </div>

                <div class="mt-6">
                    <button onclick="loginWithGoogle()" class="w-full flex justify-center items-center gap-3 py-2 px-4 border border-gray-300 rounded-md shadow-sm bg-white hover:bg-gray-50 transition-colors duration-200 text-sm font-semibold text-gray-700">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.14-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                </div>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Belum punya akun? <a href="register.html" class="font-medium text-green-600 hover:text-green-500 border-b border-green-600 pb-0.5">Daftar di sini</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="./js/app.js"></script>
    <script>
        // --- 1. Fungsi Mengisi Otomatis (Remember Me) saat halaman dimuat ---
        window.addEventListener('DOMContentLoaded', () => {
            renderNavbar(); 
            renderFooter();

            const savedEmail = localStorage.getItem('rememberedEmail');
            const savedPassword = localStorage.getItem('rememberedPassword');
            
            if (savedEmail && savedPassword) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('password').value = savedPassword;
                document.getElementById('remember-me').checked = true;
            }

            // Redirect jika sudah login
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) {
                window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            }
        });

        // --- 2. Fungsi Login Form Biasa ---
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const isRememberChecked = document.getElementById('remember-me').checked;
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Simpan data jika "Ingat Saya" dicentang
                if (isRememberChecked) {
                    localStorage.setItem('rememberedEmail', email);
                    localStorage.setItem('rememberedPassword', password);
                } else {
                    localStorage.removeItem('rememberedEmail');
                    localStorage.removeItem('rememberedPassword');
                }

                localStorage.setItem('currentUser', JSON.stringify(user));
                Swal.fire({
                    icon: 'success',
                    title: 'Login Berhasil!',
                    text: 'Selamat datang kembali, ' + (user.name || user.email),
                    showConfirmButton: false,
                    timer: 1500
                }).then(() => {
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Akses Ditolak',
                    text: 'Email atau password salah!',
                    confirmButtonColor: '#166534'
                });
            }
        });

        // --- 3. Fungsi Simulasi Login Google (Sync dengan Akun Register Michael) ---
        function loginWithGoogle() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Konsep: Ambil user yang memiliki role 'user' (didapat dari hasil register sebelumnya)
            const registeredUsers = users.filter(u => u.role === 'user');
            const user = registeredUsers[registeredUsers.length - 1]; 

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                Swal.fire({
                    icon: 'success',
                    title: 'Login Google Berhasil!',
                    text: `Selamat datang, ${user.name}! Anda masuk menggunakan sinkronisasi akun.`,
                    showConfirmButton: false,
                    timer: 2000
                }).then(() => {
                    window.location.href = 'dashboard.html';
                });
            } else {
                Swal.fire({
                    icon: 'warning',
                    title: 'Akun Belum Ada',
                    text: 'Michael, kamu belum punya akun di database. Silakan register dulu ya!',
                    confirmButtonText: 'Ke Halaman Daftar',
                    confirmButtonColor: '#166534'
                }).then(() => {
                    window.location.href = 'register.html';
                });
            }
        }
    </script>
</body>
</html>
