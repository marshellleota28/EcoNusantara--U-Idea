<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Eco Nusantara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen opacity-0 transition-opacity duration-300" onload="document.body.classList.remove('opacity-0')">

    <div id="navbar-container"></div>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full glass p-8 rounded-2xl shadow-xl relative overflow-hidden">
            <div class="absolute top-0 left-0 -ml-8 -mt-8 w-32 h-32 bg-green-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 z-0"></div>
            
            <div class="relative z-10">
                <div class="text-center mb-8">
                    <i data-lucide="user-plus" class="h-10 w-10 text-green-600 mx-auto mb-2"></i>
                    <h2 class="text-3xl font-extrabold text-gray-900 font-serif">Buat Akun</h2>
                    <p class="text-sm text-gray-600 mt-2">Gabung bersama ribuan relawan lainnya.</p>
                </div>

                <form id="register-form" class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <input type="text" id="name" required class="focus:ring-green-500 focus:border-green-500 block w-full px-4 py-2 border-gray-300 rounded-md border" placeholder="Cth: Budi Santoso">
                        </div>
                    </div>

                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700">Nomor Telepon</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <input type="tel" id="phone" required class="focus:ring-green-500 focus:border-green-500 block w-full px-4 py-2 border-gray-300 rounded-md border" placeholder="Cth: 08123456789">
                        </div>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <input type="email" id="email" required class="focus:ring-green-500 focus:border-green-500 block w-full px-4 py-2 border-gray-300 rounded-md border" placeholder="anda@email.com">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <input type="password" id="password" required minlength="6" class="focus:ring-green-500 focus:border-green-500 block w-full px-4 py-2 border-gray-300 rounded-md border" placeholder="Min. 6 Karakter">
                        </div>
                    </div>

                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-gray-700">Konfirmasi Password</label>
                        <div class="mt-1 relative rounded-md shadow-sm">
                            <input type="password" id="confirm-password" required minlength="6" class="focus:ring-green-500 focus:border-green-500 block w-full px-4 py-2 border-gray-300 rounded-md border" placeholder="Ulangi Password">
                        </div>
                    </div>

                    <div class="pt-2">
                        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-transform transform hover:scale-105 duration-200">
                            Daftar Sekarang
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Sudah punya akun? <a href="login.html" class="font-medium text-green-600 hover:text-green-500 border-b border-green-600 pb-0.5">Masuk di sini</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="./js/app.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                Swal.fire({
                    icon: 'error',
                    title: 'Oops...',
                    text: 'Password & Konfirmasi harus sama!',
                    confirmButtonColor: '#166534'
                });
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.find(u => u.email === email)) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Email Terdaftar',
                    text: 'Email ini sudah digunakan oleh akun lain.',
                    confirmButtonColor: '#166534'
                });
                return;
            }

            const newUser = {
                id: Date.now(),
                name: name,
                phone: phone,
                email: email,
                password: password,
                role: 'user',
                points: 0,
                treesAdopted: 0,
                donations: []
            };

            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // Auto-login
            localStorage.setItem('currentUser', JSON.stringify(newUser));

            Swal.fire({
                icon: 'success',
                title: 'Pendaftaran Berhasil!',
                text: 'Akun Anda telah dibuat. Mengarahkan ke Dashboard...',
                showConfirmButton: false,
                timer: 2000
            }).then(() => {
                window.location.href = 'dashboard.html';
            });
        });

        // Redirect if already logged in
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) {
                window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html';
            }
        });
    </script>
</body>
</html>
