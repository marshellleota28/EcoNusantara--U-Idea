<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami - Eco Nusantara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <div id="navbar-container"></div>

    <main class="flex-grow">
        <div class="relative bg-green-900 py-20 flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 z-0 opacity-40">
                <img src="https://images.unsplash.com/photo-1423666639041-f56000c27a9a?auto=format&fit=crop&q=80&w=1500" alt="Contact Background" class="w-full h-full object-cover">
            </div>
            <div class="relative z-10 text-center px-4">
                <h1 class="text-4xl md:text-5xl font-extrabold font-serif text-white mb-4">Hubungi Kami</h1>
                <p class="text-xl text-green-100 max-w-2xl mx-auto">Ada pertanyaan atau ingin berkolaborasi? Kami siap mendengar dari Anda.</p>
            </div>
        </div>

        <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 -mt-10 relative z-20">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <div class="lg:col-span-1 space-y-6">
                    <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 h-full">
                        <h2 class="text-2xl font-bold font-serif text-green-900 mb-8">Informasi Kontak</h2>
                        
                        <div class="space-y-8">
                            <div class="flex items-start">
                                <div class="bg-green-100 p-3 rounded-2xl mr-4 text-green-700">
                                    <i data-lucide="mail" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-gray-500 uppercase">Email Umum</p>
                                    <p class="text-gray-800 font-medium">info@econusantara.id</p>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <div class="bg-blue-100 p-3 rounded-2xl mr-4 text-blue-700">
                                    <i data-lucide="phone" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-gray-500 uppercase">WhatsApp Hotman</p>
                                    <p class="text-gray-800 font-medium">+62 812-3456-7890</p>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <div class="bg-yellow-100 p-3 rounded-2xl mr-4 text-yellow-700">
                                    <i data-lucide="map-pin" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold text-gray-500 uppercase">Kantor Pusat</p>
                                    <p class="text-gray-800 font-medium">Jl. Hijau Lestari No. 45, Salatiga, Indonesia</p>
                                </div>
                            </div>
                        </div>

                        <div class="mt-12 pt-8 border-t border-gray-100 text-center">
                            <p class="text-sm font-bold text-gray-400 uppercase mb-4">Ikuti Media Sosial</p>
                            <div class="flex justify-center space-x-4">
                                <a href="#" class="p-2 bg-gray-50 rounded-full hover:bg-green-600 hover:text-white transition-all">
                                    <i data-lucide="instagram" class="w-5 h-5"></i>
                                </a>
                                <a href="#" class="p-2 bg-gray-50 rounded-full hover:bg-green-600 hover:text-white transition-all">
                                    <i data-lucide="facebook" class="w-5 h-5"></i>
                                </a>
                                <a href="#" class="p-2 bg-gray-50 rounded-full hover:bg-green-600 hover:text-white transition-all">
                                    <i data-lucide="twitter" class="w-5 h-5"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white rounded-3xl shadow-xl p-8 md:p-10 border border-gray-100">
                        <h2 class="text-2xl font-bold font-serif text-gray-900 mb-6">Kirim Pesan</h2>
                        <form id="contact-form" class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Nama Lengkap</label>
                                    <input type="text" id="contact-name" required 
                                        class="w-full border-gray-300 rounded-xl p-3 bg-gray-50 border focus:ring-2 focus:ring-green-500 outline-none transition" 
                                        placeholder="Cth: Michael Julio">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Alamat Email</label>
                                    <input type="email" id="contact-email" required 
                                        class="w-full border-gray-300 rounded-xl p-3 bg-gray-50 border focus:ring-2 focus:ring-green-500 outline-none transition" 
                                        placeholder="anda@email.com">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Subjek</label>
                                <select id="contact-subject" class="w-full border-gray-300 rounded-xl p-3 bg-gray-50 border focus:ring-2 focus:ring-green-500 outline-none transition">
                                    <option value="General">Tanya Umum</option>
                                    <option value="Donasi">Masalah Donasi</option>
                                    <option value="Volunteer">Kerja Sama Volunteer</option>
                                    <option value="Bisnis">Kemitraan/CSR</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Pesan Anda</label>
                                <textarea id="contact-message" rows="5" required 
                                    class="w-full border-gray-300 rounded-xl p-3 bg-gray-50 border focus:ring-2 focus:ring-green-500 outline-none transition" 
                                    placeholder="Tuliskan pesan Anda di sini..."></textarea>
                            </div>
                            <button type="submit" 
                                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-xl shadow-lg transition transform hover:scale-[1.02]">
                                Kirim Pesan Sekarang
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="./js/app.js"></script>
    <script>
        // Logika lokal untuk form kontak
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Animasi loading ala Eco Nusantara
            Swal.fire({
                title: 'Mengirim Pesan...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            setTimeout(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'Pesan Terkirim!',
                    text: 'Terima kasih telah menghubungi kami. Tim kami akan membalas via email secepatnya.',
                    confirmButtonColor: '#166534'
                });
                this.reset();
            }, 1500);
        });

        // Mengisi data otomatis jika user login
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) {
                document.getElementById('contact-name').value = user.name || "";
                document.getElementById('contact-email').value = user.email || "";
            }
        });
    </script>
</body>
</html>
